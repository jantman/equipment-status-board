site_name: Equipment Status Board Documentation
site_description: User guides and administrator documentation for the Equipment Status Board
site_url: https://jantman.github.io/equipment-status-board/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.tabs.link

nav:
  - Home: index.md
  - Members Guide: members.md
  - Technicians Guide: technicians.md
  - Staff Guide: staff.md
  - Administrators Guide: administrators.md

# Adding a `plugins:` key disables the implicit default `search` plugin, so it
# must be listed explicitly. The macros plugin's DEFAULT is `on_undefined: keep`,
# which silently passes undefined `{{ var }}` through even under `--strict` —
# `on_undefined: strict` is REQUIRED for the CI drift guard to fail loudly.
plugins:
  - search
  - macros:
      on_undefined: strict

# Generic default values rendered on the public GH Pages site where the docs
# placeholders appear. Every key here MUST also exist in the docs service's
# get_placeholder_values(); both renderers fail on drift.
extra:
  oops_channel: '#oops'

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
